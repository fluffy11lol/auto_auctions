name: auto_auctions
description: "Car auctions aggregator from USA"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  go_router: ^14.8.1

  # Состояние (как глобальные переменные, но правильно)
  provider: ^6.1.2

  # Локальная БД (NoSQL-like)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Утилиты
  uuid: ^4.5.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  share_plus: ^10.1.4

  #api
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # UI
  flutter_slidable: ^3.1.1
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true  # для локализации